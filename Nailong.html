<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奶龙娱乐空间站✨游戏·绘画·小说</title>
    <style>
        /* ========== CSS变量 & 主题 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "PingFang SC", system-ui, sans-serif;
            transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
        }
        :root {
            --bg-body: #12141d;
            --bg-card: #1e202e;
            --bg-input: #272938;
            --bg-chat: #272938;
            --text-primary: #f8f9ff;
            --text-secondary: #b0b5cc;
            --border-color: #33364a;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --nav-bg: #1e202e;
            --yellow: #ffe100;
            --blue: #54c0ff;
            --pink: #ff6b8b;
            --red: #ff4466;
            --green: #44d47c;
            --card-radius: 16px;
            --nav-height: 64px;
        }
        [data-theme="light"] {
            --bg-body: #edf0f7;
            --bg-card: #ffffff;
            --bg-input: #e8ecf5;
            --bg-chat: #f0f3fa;
            --text-primary: #141624;
            --text-secondary: #4a4d66;
            --border-color: #d0d4e0;
            --shadow-color: rgba(0, 0, 0, 0.07);
            --nav-bg: #ffffff;
            --yellow: #e8c800;
            --blue: #3a8fcb;
            --pink: #d94a6e;
            --red: #cc3355;
            --green: #2aad6a;
        }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* ===== 导航栏 ===== */
        .nav-bar {
            width: 100%;
            height: var(--nav-height);
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-bottom: 2px solid var(--yellow);
            position: sticky;
            top: 0;
            z-index: 999;
            flex-wrap: wrap;
            gap: 6px;
            box-shadow: 0 2px 16px var(--shadow-color);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: bold;
            color: var(--yellow);
            white-space: nowrap;
        }
        .logo span {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: normal;
            margin-left: 2px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            background: var(--bg-input);
            color: var(--text-secondary);
        }
        .nav-btn.active {
            transform: scale(1.04);
            box-shadow: 0 0 16px var(--yellow);
        }
        .nav-btn.btn-game.active {
            background: var(--yellow);
            color: #000;
        }
        .nav-btn.btn-story.active {
            background: var(--pink);
            color: #fff;
        }
        .nav-btn:hover {
            filter: brightness(1.15);
        }
        .ctrl-btn {
            padding: 4px 10px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            font-weight: 500;
        }
        .ctrl-btn:hover {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .ctrl-btn.active-ctrl {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .theme-group, .lang-group {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .theme-group .ctrl-btn, .lang-group .ctrl-btn {
            padding: 3px 8px;
            font-size: 11px;
        }
        .divider {
            color: var(--border-color);
            font-size: 16px;
            padding: 0 2px;
        }

        /* ===== 模块容器 ===== */
        .module {
            width: 95%;
            max-width: 1100px;
            margin: 18px auto;
            display: none;
            border-radius: var(--card-radius);
            padding: 20px;
            background: var(--bg-card);
            min-height: calc(100vh - 100px);
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .module.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 游戏模块 ===== */
        .game-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .game-tab {
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        .game-tab.active-tab {
            background: var(--yellow);
            color: #000;
            border-color: var(--yellow);
        }
        .game-tab:hover {
            filter: brightness(1.1);
        }
        .game-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .game-panel.active-panel {
            display: flex;
        }
        .game-canvas-wrap {
            width: 100%;
            border: 3px solid var(--yellow);
            border-radius: 12px;
            overflow: hidden;
            background: #0b0c14;
            position: relative;
        }
        #panel-goban .game-canvas-wrap {
            aspect-ratio: 1 / 1;
            max-width: 600px;
        }
        #panel-tetris .game-canvas-wrap {
            aspect-ratio: 10 / 20;
            max-width: 360px;
        }
        #panel-paint .game-canvas-wrap {
            aspect-ratio: 4 / 3;
            max-width: 640px;
        }
        .game-canvas-wrap canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
        .game-control {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .game-btn {
            padding: 6px 22px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--yellow);
            color: #000;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
        }
        .game-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .game-status {
            font-weight: bold;
            padding: 4px 16px;
            border-radius: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            font-size: 14px;
        }
        .color-picker-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .color-picker-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .color-picker-group input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: none;
            cursor: pointer;
        }
        .brush-size {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brush-size input[type="range"] {
            width: 100px;
            accent-color: var(--yellow);
        }

        /* ===== 小说模块 ===== */
        .story-wrap { padding: 4px 0; }
        .story-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .story-head h2 { font-size: 19px; color: var(--pink); }
        .generate-story {
            padding: 9px 24px;
            border-radius: 10px;
            border: none;
            background: var(--red);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .generate-story:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .generate-story:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .story-content {
            padding: 20px 24px;
            background: var(--bg-input);
            border-radius: 12px;
            line-height: 2;
            font-size: 15px;
            text-indent: 2em;
            min-height: 400px;
            white-space: pre-line;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            max-height: 70vh;
            overflow-y: auto;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 28px;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 24px;
            display: none;
            z-index: 9999;
            border: 1px solid var(--yellow);
            box-shadow: 0 4px 24px var(--shadow-color);
            font-size: 14px;
            font-weight: 500;
            max-width: 92%;
            text-align: center;
        }

        /* ===== 滚动条 ===== */
        .story-content::-webkit-scrollbar {
            width: 5px;
        }
        .story-content::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        .story-content::-webkit-scrollbar-thumb {
            background: var(--yellow);
            border-radius: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .nav-bar { padding: 0 10px; height: auto; min-height: 56px; }
            .logo { font-size: 15px; }
            .logo span { font-size: 11px; }
            .nav-btn { font-size: 11px; padding: 4px 10px; }
            .ctrl-btn { font-size: 10px; padding: 3px 7px; }
            .module { padding: 14px; width: 98%; margin: 12px auto; }
            .game-canvas-wrap { max-width: 100% !important; }
            #panel-tetris .game-canvas-wrap { max-width: 280px; }
            .story-content { font-size: 14px; padding: 14px 18px; min-height: 280px; }
            .story-head h2 { font-size: 16px; }
            .nav-right { gap: 4px; }
            .theme-group .ctrl-btn, .lang-group .ctrl-btn { font-size: 10px; padding: 2px 6px; }
            .divider { font-size: 13px; }
            .game-tab { font-size: 12px; padding: 4px 14px; }
        }
        @media (max-width: 480px) {
            .nav-btn-group .nav-btn { font-size: 10px; padding: 3px 8px; }
            .logo { font-size: 13px; }
            .game-btn { font-size: 12px; padding: 4px 14px; }
            .story-content { font-size: 13px; padding: 12px 14px; min-height: 200px; }
            .game-tab { font-size: 11px; padding: 3px 10px; }
            .color-picker-group input[type="color"] { width: 32px; height: 32px; }
            #panel-tetris .game-canvas-wrap { max-width: 220px; }
        }
    </style>
</head>
<body>
    <!-- ===== 导航 ===== -->
    <div class="nav-bar">
        <div class="logo">🐲 奶龙娱乐 <span id="logoSub">空间站</span></div>
        <div class="nav-right">
            <div class="nav-btn-group">
                <button class="nav-btn btn-game active" data-target="gameModule" data-key="navGame">🎮 游戏</button>
                <button class="nav-btn btn-story" data-target="storyModule" data-key="navStory">📖 末世文</button>
            </div>
            <span class="divider">|</span>
            <div class="theme-group">
                <button class="ctrl-btn active-ctrl" data-theme="dark" data-key="themeDark">🌙</button>
                <button class="ctrl-btn" data-theme="light" data-key="themeLight">☀️</button>
            </div>
            <span class="divider">|</span>
            <div class="lang-group">
                <button class="ctrl-btn active-ctrl" data-lang="zh" data-key="langZh">中文</button>
                <button class="ctrl-btn" data-lang="en" data-key="langEn">EN</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块1：游戏 ===== -->
    <div id="gameModule" class="module show">
        <div class="game-tabs" id="gameTabs">
            <button class="game-tab active-tab" data-game="goban" data-key="tabGoban">♟ 五子棋</button>
            <button class="game-tab" data-game="tetris" data-key="tabTetris">🧩 俄罗斯方块</button>
            <button class="game-tab" data-game="paint" data-key="tabPaint">🎨 绘画板</button>
        </div>

        <!-- 五子棋 -->
        <div class="game-panel active-panel" id="panel-goban">
            <div class="game-status" id="gobanStatus" data-key="gobanBlackTurn">黑棋走</div>
            <div class="game-canvas-wrap">
                <canvas id="gobanCanvas" width="700" height="700"></canvas>
            </div>
            <div class="game-control">
                <button class="game-btn" id="gobanReset" data-key="gobanNewGame">🔄 新游戏</button>
                <button class="game-btn" id="gobanUndo" data-key="gobanUndo">↩ 悔棋</button>
            </div>
        </div>

        <!-- 俄罗斯方块 -->
        <div class="game-panel" id="panel-tetris">
            <div class="game-status" id="tetrisStatus" data-key="tetrisScore">得分: 0</div>
            <div class="game-canvas-wrap">
                <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            </div>
            <div class="game-control">
                <button class="game-btn" id="tetrisStart" data-key="tetrisStart">▶ 开始</button>
                <button class="game-btn" id="tetrisPause" data-key="tetrisPause">⏸ 暂停</button>
                <button class="game-btn" id="tetrisReset" data-key="tetrisReset">🔄 重置</button>
                <span class="game-hint" data-key="tetrisHint" style="color:var(--text-secondary);font-size:13px;">⬅⬇➡ 移动 · ⬆ 旋转</span>
            </div>
        </div>

        <!-- 绘画板 -->
        <div class="game-panel" id="panel-paint">
            <div class="game-status" id="paintStatus" data-key="paintStatus">🎨 自由绘画</div>
            <div class="game-canvas-wrap">
                <canvas id="paintCanvas" width="800" height="600"></canvas>
            </div>
            <div class="game-control" style="flex-wrap:wrap; gap:10px;">
                <div class="color-picker-group">
                    <label data-key="paintColorLabel">颜色</label>
                    <input type="color" id="paintColor" value="#ffe100">
                    <label data-key="paintSizeLabel">粗细</label>
                    <input type="range" id="paintSize" min="2" max="30" value="8">
                </div>
                <button class="game-btn" id="paintClear" data-key="paintClear">🗑 清空</button>
                <button class="game-btn" id="paintEraser" data-key="paintEraser">🧽 橡皮</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块2：小说 ===== -->
    <div id="storyModule" class="module">
        <div class="story-wrap">
            <div class="story-head">
                <h2><span data-key="storyTitle">抽象末世 · 奶龙重生复仇</span></h2>
                <button class="generate-story" id="createStory" data-key="storyGen">⚡ 生成全新篇章</button>
            </div>
            <div class="story-content" id="storyBox">
                <span data-key="storyPlaceholder">点击右侧按钮，生成一篇独一无二的末世重生复仇故事，每次完全不同。</span>
            </div>
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast">✨ 提示</div>

    <script>
        // ============================================================
        //  1. 多语言词库（全面覆盖）
        // ============================================================
        const LANG = {
            zh: {
                navGame: '🎮 游戏',
                navStory: '📖 末世文',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: '空间站',
                tabGoban: '♟ 五子棋',
                tabTetris: '🧩 俄罗斯方块',
                tabPaint: '🎨 绘画板',
                gobanBlackTurn: '黑棋走',
                gobanWhiteTurn: '白棋走',
                gobanAIThinking: 'AI思考中...',
                gobanYouWin: '🎉 你赢了！',
                gobanAIWin: '😵 AI赢了...',
                gobanDraw: '🤝 平局',
                gobanNewGame: '🔄 新游戏',
                gobanUndo: '↩ 悔棋',
                tetrisScore: '得分: {score}',
                tetrisPaused: '⏸ 暂停',
                tetrisGameOver: '💀 游戏结束',
                tetrisStart: '▶ 开始',
                tetrisPause: '⏸ 暂停',
                tetrisReset: '🔄 重置',
                tetrisHint: '⬅⬇➡ 移动 · ⬆ 旋转',
                paintStatus: '🎨 自由绘画',
                paintColorLabel: '颜色',
                paintSizeLabel: '粗细',
                paintClear: '🗑 清空',
                paintEraser: '🧽 橡皮',
                paintEraserActive: '✏️ 画笔',
                storyTitle: '抽象末世 · 奶龙重生复仇',
                storyGen: '⚡ 生成全新篇章',
                storyPlaceholder: '点击右侧按钮，生成一篇独一无二的末世重生复仇故事，每次完全不同。',
                // 故事章节标题（英文版另有）
                storyChapterPrologue: '序章 · 末世铁律',
                storyChapterPast: '前世 · 血与背叛',
                storyChapterAwaken: '觉醒 · 禁忌之力',
                storyChapterHunt: '征途 · 荒原猎杀',
                storyChapterTwist: '惊天反转 · 真相浮现',
                storyChapterFinal: '最终抉择 · 宿命终章',
                storyFooter: '【本故事纯属抽象虚构 · 无科学逻辑 · 无世界观闭环 · 随机生成仅此一篇】',
                storyFooter2: '🐲 奶龙专属 · 末世复仇史诗 · 万次重生永不完结',
                storyTime: '✨ 生成时间：',
                // 游戏内通用
                gameOver: '游戏结束',
                restart: '点击「重置」重新开始',
            },
            en: {
                navGame: '🎮 Games',
                navStory: '📖 Apocalypse',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: 'Station',
                tabGoban: '♟ Gomoku',
                tabTetris: '🧩 Tetris',
                tabPaint: '🎨 Paint',
                gobanBlackTurn: 'Black\'s turn',
                gobanWhiteTurn: 'White\'s turn',
                gobanAIThinking: 'AI thinking...',
                gobanYouWin: '🎉 You win!',
                gobanAIWin: '😵 AI wins...',
                gobanDraw: '🤝 Draw',
                gobanNewGame: '🔄 New Game',
                gobanUndo: '↩ Undo',
                tetrisScore: 'Score: {score}',
                tetrisPaused: '⏸ Paused',
                tetrisGameOver: '💀 GAME OVER',
                tetrisStart: '▶ Start',
                tetrisPause: '⏸ Pause',
                tetrisReset: '🔄 Reset',
                tetrisHint: '⬅⬇➡ Move · ⬆ Rotate',
                paintStatus: '🎨 Free Paint',
                paintColorLabel: 'Color',
                paintSizeLabel: 'Size',
                paintClear: '🗑 Clear',
                paintEraser: '🧽 Eraser',
                paintEraserActive: '✏️ Brush',
                storyTitle: 'Abstract Apocalypse · Revenge Rebirth',
                storyGen: '⚡ Generate New',
                storyPlaceholder: 'Click to generate a unique apocalyptic revenge story. Completely different each time.',
                // English story chapters
                storyChapterPrologue: 'Prologue · Iron Law',
                storyChapterPast: 'Past · Blood & Betrayal',
                storyChapterAwaken: 'Awakening · Forbidden Power',
                storyChapterHunt: 'Hunt · Wasteland Slaughter',
                storyChapterTwist: 'Twist · Truth Revealed',
                storyChapterFinal: 'Final Choice · Destiny',
                storyFooter: '【Pure abstract fiction · No scientific logic · No closed-loop world view · Generated only once】',
                storyFooter2: '🐲 Nailong Exclusive · Epic Revenge · Endless Rebirth',
                storyTime: '✨ Generated at: ',
                gameOver: 'GAME OVER',
                restart: 'Click "Reset" to restart',
            }
        };

        // ============================================================
        //  2. 全局翻译函数 & 当前语言
        // ============================================================
        let currentLang = 'zh';

        function __(key, ...args) {
            let text = LANG[currentLang]?.[key];
            if (text === undefined) {
                // fallback to Chinese
                text = LANG['zh'][key] || key;
            }
            // 替换 {0} 等占位符
            if (args && args.length) {
                for (let i = 0; i < args.length; i++) {
                    text = text.replace(`{${i}}`, args[i]);
                }
            }
            return text;
        }

        function __score(score) {
            return __('tetrisScore').replace('{score}', score);
        }

        // ============================================================
        //  3. 语言 & 主题 切换
        // ============================================================
        function applyLang(lang) {
            currentLang = lang;
            // 更新所有 data-key 元素
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (key) {
                    let text = __(key);
                    if (el.tagName === 'INPUT' && el.placeholder !== undefined) {
                        el.placeholder = text;
                    } else if (el.tagName === 'BUTTON' && el.id !== 'createStory' && !el.dataset.game) {
                        // 普通按钮
                        el.textContent = text;
                    } else {
                        el.textContent = text;
                    }
                }
            });
            // 特殊处理：logo子标题
            document.getElementById('logoSub').textContent = __('logoSub');
            // 更新游戏状态（如果有动态状态，需要刷新）
            updateAllGameStatus();

        // ============================================================
        //  7. 五子棋 (高难度)
        // ============================================================
        const gobanCanvas = document.getElementById('gobanCanvas');
        const gCtx = gobanCanvas.getContext('2d');
        const BOARD_SIZE = 15;
        let CELL_SIZE = gobanCanvas.width / (BOARD_SIZE + 1);
        let gobanBoard = [];
        let gobanTurn = 'black';
        let gameOver = false;
        let gobanHistory = [];

        function initGoban() {
            gobanBoard = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
            gobanTurn = 'black';
            gameOver = false;
            gobanHistory = [];
            updateGobanStatusText();
            drawGoban();
        }

        function updateGobanStatusText() {
            const el = document.getElementById('gobanStatus');
            if (gameOver) {
                // 状态已经在游戏逻辑中设置，这里保持
                return;
            }
            if (gobanTurn === 'black') {
                el.textContent = __('gobanBlackTurn');
            } else {
                el.textContent = __('gobanWhiteTurn');
            }
        }

        function drawGoban() {
            const w = gobanCanvas.width,
                h = gobanCanvas.height;
            gCtx.clearRect(0, 0, w, h);
            gCtx.fillStyle = '#d4b48c';
            gCtx.fillRect(0, 0, w, h);
            const offset = CELL_SIZE;
            gCtx.strokeStyle = '#000';
            gCtx.lineWidth = 1;
            for (let i = 0; i < BOARD_SIZE; i++) {
                gCtx.beginPath();
                gCtx.moveTo(offset, offset + i * CELL_SIZE);
                gCtx.lineTo(offset + (BOARD_SIZE - 1) * CELL_SIZE, offset + i * CELL_SIZE);
                gCtx.stroke();
                gCtx.beginPath();
                gCtx.moveTo(offset + i * CELL_SIZE, offset);
                gCtx.lineTo(offset + i * CELL_SIZE, offset + (BOARD_SIZE - 1) * CELL_SIZE);
                gCtx.stroke();
            }
            const stars = [
                [3, 3],
                [3, 11],
                [11, 3],
                [11, 11],
                [7, 7]
            ];
            gCtx.fillStyle = '#000';
            stars.forEach(([x, y]) => {
                gCtx.beginPath();
                gCtx.arc(offset + x * CELL_SIZE, offset + y * CELL_SIZE, 5, 0, Math.PI * 2);
                gCtx.fill();
            });
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const val = gobanBoard[y][x];
                    if (!val) continue;
                    const cx = offset + x * CELL_SIZE;
                    const cy = offset + y * CELL_SIZE;
                    const grad = gCtx.createRadialGradient(cx - 4, cy - 4, 4, cx, cy, CELL_SIZE * 0.45);
                    if (val === 'black') {
                        grad.addColorStop(0, '#1a1a1a');
                        grad.addColorStop(1, '#000');
                    } else {
                        grad.addColorStop(0, '#f9f9f9');
                        grad.addColorStop(1, '#ccc');
                    }
                    gCtx.beginPath();
                    gCtx.arc(cx, cy, CELL_SIZE * 0.42, 0, Math.PI * 2);
                    gCtx.fillStyle = grad;
                    gCtx.fill();
                    gCtx.shadowColor = 'rgba(0,0,0,0.3)';
                    gCtx.shadowBlur = 6;
                    gCtx.fill();
                    gCtx.shadowBlur = 0;
                }
            }
            if (gameOver) {
                gCtx.fillStyle = 'rgba(0,0,0,0.5)';
                gCtx.fillRect(0, 0, w, h);
                gCtx.fillStyle = '#ffe100';
                gCtx.font = 'bold 34px sans-serif';
                gCtx.textAlign = 'center';
                gCtx.textBaseline = 'middle';
                gCtx.fillText(__('gameOver'), w / 2, h / 2 - 20);
                gCtx.font = '18px sans-serif';
                gCtx.fillStyle = '#fff';
                gCtx.fillText(__('restart'), w / 2, h / 2 + 40);
            }
        }

        function checkWin(row, col, color) {
            const dirs = [
                [1, 0],
                [0, 1],
                [1, 1],
                [1, -1]
            ];
            for (const [dx, dy] of dirs) {
                let count = 1;
                for (let step = 1; step < 5; step++) {
                    const nx = col + dx * step,
                        ny = row + dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else break;
                }
                for (let step = 1; step < 5; step++) {
                    const nx = col - dx * step,
                        ny = row - dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function isBoardFull() {
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (!gobanBoard[y][x]) return false;
                }
            }
            return true;
        }

        function gobanPlace(row, col) {
            if (gameOver) return;
            if (gobanTurn !== 'black') return;
            if (gobanBoard[row][col]) return;
            gobanBoard[row][col] = 'black';
            gobanHistory.push({ row, col, color: 'black' });
            drawGoban();
            if (checkWin(row, col, 'black')) {
                document.getElementById('gobanStatus').textContent = __('gobanYouWin');
                gameOver = true;
                drawGoban();
                return;
            }
            if (isBoardFull()) {
                document.getElementById('gobanStatus').textContent = __('gobanDraw');
                gameOver = true;
                drawGoban();
                return;
            }
            gobanTurn = 'white';
            document.getElementById('gobanStatus').textContent = __('gobanAIThinking');
            setTimeout(() => { aiMove(); }, 80);
        }

        // AI 评分
        function evaluatePoint(row, col, color) {
            if (gobanBoard[row][col]) return -1;
            let totalScore = 0;
            const dirs = [
                [1, 0],
                [0, 1],
                [1, 1],
                [1, -1]
            ];
            for (const [dx, dy] of dirs) {
                let count = 1;
                let openLeft = 0,
                    openRight = 0;
                for (let step = 1; step < 5; step++) {
                    const nx = col + dx * step,
                        ny = row + dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else if (gobanBoard[ny][nx] === null) { openRight++; break; } else break;
                }
                for (let step = 1; step < 5; step++) {
                    const nx = col - dx * step,
                        ny = row - dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else if (gobanBoard[ny][nx] === null) { openLeft++; break; } else break;
                }
                let score = 0;
                if (count >= 5) score += 100000;
                else if (count === 4) {
                    if (openLeft > 0 && openRight > 0) score += 50000;
                    else if (openLeft > 0 || openRight > 0) score += 3000;
                } else if (count === 3) {
                    if (openLeft > 0 && openRight > 0) score += 5000;
                    else if (openLeft > 0 || openRight > 0) score += 200;
                } else if (count === 2) {
                    if (openLeft > 0 && openRight > 0) score += 50;
                    else if (openLeft > 0 || openRight > 0) score += 10;
                } else if (count === 1) {
                    score += 1;
                }
                totalScore += score;
            }
            return totalScore;
        }

        function aiMove() {
            if (gameOver) return;
            let bestScore = -1;
            let bestMoves = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (gobanBoard[y][x]) continue;
                    const whiteScore = evaluatePoint(y, x, 'white');
                    const blackScore = evaluatePoint(y, x, 'black');
                    const total = whiteScore * 1.2 + blackScore * 1.5;
                    if (total > bestScore) {
                        bestScore = total;
                        bestMoves = [{ row: y, col: x }];
                    } else if (total === bestScore) {
                        bestMoves.push({ row: y, col: x });
                    }
                }
            }
            if (bestMoves.length === 0) {
                if (isBoardFull()) {
                    document.getElementById('gobanStatus').textContent = __('gobanDraw');
                    gameOver = true;
                    drawGoban();
                }
                return;
            }
            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            gobanBoard[move.row][move.col] = 'white';
            gobanHistory.push({ row: move.row, col: move.col, color: 'white' });
            drawGoban();
            if (checkWin(move.row, move.col, 'white')) {
                document.getElementById('gobanStatus').textContent = __('gobanAIWin');
                gameOver = true;
                drawGoban();
                return;
            }
            if (isBoardFull()) {
                document.getElementById('gobanStatus').textContent = __('gobanDraw');
                gameOver = true;
                drawGoban();
                return;
            }
            gobanTurn = 'black';
            document.getElementById('gobanStatus').textContent = __('gobanBlackTurn');
        }

        gobanCanvas.addEventListener('click', (e) => {
            const rect = gobanCanvas.getBoundingClientRect();
            const scaleX = gobanCanvas.width / rect.width;
            const scaleY = gobanCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const offset = CELL_SIZE;
            const col = Math.round((x - offset) / CELL_SIZE);
            const row = Math.round((y - offset) / CELL_SIZE);
            if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
            gobanPlace(row, col);
        });

        document.getElementById('gobanReset').addEventListener('click', initGoban);
        document.getElementById('gobanUndo').addEventListener('click', () => {
            if (gameOver) return;
            if (gobanHistory.length < 2) return;
            for (let i = 0; i < 2; i++) {
                const last = gobanHistory.pop();
                if (last) gobanBoard[last.row][last.col] = null;
            }
            gobanTurn = 'black';
            document.getElementById('gobanStatus').textContent = __('gobanBlackTurn');
            drawGoban();
        });

        initGoban();

        // ============================================================
        //  8. 俄罗斯方块
        // ============================================================
        const tetrisCanvas = document.getElementById('tetrisCanvas');
        const tCtx = tetrisCanvas.getContext('2d');
        const TETRIS_COLS = 10,
            TETRIS_ROWS = 20;
        let BLOCK_SIZE = tetrisCanvas.width / TETRIS_COLS;
        let tetrisBoard = [];
        let tetrisPiece = null;
        let tetrisScore = 0;
        let tetrisGameOver = false;
        let tetrisPaused = false;
        let tetrisInterval = null;

        const PIECES = [
            { shape: [
                    [1, 1, 1, 1]
                ], color: '#54c0ff' },
            { shape: [
                    [1, 1],
                    [1, 1]
                ], color: '#ffe100' },
            { shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ], color: '#ff6b8b' },
            { shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ], color: '#ff4466' },
            { shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ], color: '#44d47c' },
            { shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ], color: '#ffaa22' },
            { shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ], color: '#9955ff' },
        ];

        function initTetris() {
            tetrisBoard = Array.from({ length: TETRIS_ROWS }, () => Array(TETRIS_COLS).fill(0));
            tetrisScore = 0;
            tetrisGameOver = false;
            tetrisPaused = false;
            clearInterval(tetrisInterval);
            tetrisInterval = null;
            updateTetrisStatusText();
            spawnPiece();
            drawTetris();
        }

        function updateTetrisStatusText() {
            const el = document.getElementById('tetrisStatus');
            if (tetrisGameOver) {
                el.textContent = __('tetrisGameOver');
            } else if (tetrisPaused) {
                el.textContent = __('tetrisPaused');
            } else {
                el.textContent = __score(tetrisScore);
            }
        }

        function spawnPiece() {
            if (tetrisGameOver) return;
            const idx = Math.floor(Math.random() * PIECES.length);
            const piece = PIECES[idx];
            tetrisPiece = {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor((TETRIS_COLS - piece.shape[0].length) / 2),
                y: 0,
            };
            if (collision(tetrisPiece.shape, tetrisPiece.x, tetrisPiece.y)) {
                tetrisGameOver = true;
                document.getElementById('tetrisStatus').textContent = __('tetrisGameOver');
                clearInterval(tetrisInterval);
                tetrisInterval = null;
                drawTetris();
                return;
            }
            drawTetris();
        }

        function collision(shape, offX, offY) {
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[0].length; x++) {
                    if (shape[y][x]) {
                        const boardX = offX + x;
                        const boardY = offY + y;
                        if (boardX < 0 || boardX >= TETRIS_COLS || boardY >= TETRIS_ROWS || boardY < 0) return true;
                        if (boardY >= 0 && tetrisBoard[boardY][boardX]) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!tetrisPiece) return;
            const { shape, x, y, color } = tetrisPiece;
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[0].length; col++) {
                    if (shape[row][col]) {
                        const boardY = y + row;
                        const boardX = x + col;
                        if (boardY >= 0 && boardY < TETRIS_ROWS && boardX >= 0 && boardX < TETRIS_COLS) {
                            tetrisBoard[boardY][boardX] = color;
                        }
                    }
                }
            }
            let cleared = 0;
            for (let row = TETRIS_ROWS - 1; row >= 0; ) {
                if (tetrisBoard[row].every(cell => cell !== 0)) {
                    tetrisBoard.splice(row, 1);
                    tetrisBoard.unshift(Array(TETRIS_COLS).fill(0));
                    cleared++;
                } else {
                    row--;
                }
            }
            if (cleared > 0) {
                tetrisScore += cleared * 100;
                updateTetrisStatusText();
            }
            spawnPiece();
            drawTetris();
        }

        function movePiece(dx, dy) {
            if (!tetrisPiece || tetrisGameOver || tetrisPaused) return;
            const { shape, x, y } = tetrisPiece;
            if (!collision(shape, x + dx, y + dy)) {
                tetrisPiece.x += dx;
                tetrisPiece.y += dy;
                drawTetris();
            } else if (dy === 1) {
                lockPiece();
            }
        }

        function rotatePiece() {
            if (!tetrisPiece || tetrisGameOver || tetrisPaused) return;
            const oldShape = tetrisPiece.shape;
            const rotated = oldShape[0].map((val, index) => oldShape.map(row => row[index]).reverse());
            if (!collision(rotated, tetrisPiece.x, tetrisPiece.y)) {
                tetrisPiece.shape = rotated;
                drawTetris();
            } else {
                if (!collision(rotated, tetrisPiece.x - 1, tetrisPiece.y)) {
                    tetrisPiece.shape = rotated;
                    tetrisPiece.x -= 1;
                    drawTetris();
                } else if (!collision(rotated, tetrisPiece.x + 1, tetrisPiece.y)) {
                    tetrisPiece.shape = rotated;
                    tetrisPiece.x += 1;
                    drawTetris();
                }
            }
        }

        function drawTetris() {
            const w = tetrisCanvas.width,
                h = tetrisCanvas.height;
            tCtx.clearRect(0, 0, w, h);
            tCtx.fillStyle = '#0b0c14';
            tCtx.fillRect(0, 0, w, h);
            tCtx.strokeStyle = '#1a1a2e';
            tCtx.lineWidth = 0.5;
            for (let row = 0; row <= TETRIS_ROWS; row++) {
                tCtx.beginPath();
                tCtx.moveTo(0, row * BLOCK_SIZE);
                tCtx.lineTo(w, row * BLOCK_SIZE);
                tCtx.stroke();
            }
            for (let col = 0; col <= TETRIS_COLS; col++) {
                tCtx.beginPath();
                tCtx.moveTo(col * BLOCK_SIZE, 0);
                tCtx.lineTo(col * BLOCK_SIZE, h);
                tCtx.stroke();
            }
            for (let row = 0; row < TETRIS_ROWS; row++) {
                for (let col = 0; col < TETRIS_COLS; col++) {
                    const color = tetrisBoard[row][col];
                    if (color) {
                        tCtx.fillStyle = color;
                        tCtx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            if (tetrisPiece) {
                const { shape, x, y, color } = tetrisPiece;
                tCtx.fillStyle = color;
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[0].length; col++) {
                        if (shape[row][col]) {
                            const boardX = (x + col) * BLOCK_SIZE;
                            const boardY = (y + row) * BLOCK_SIZE;
                            tCtx.fillRect(boardX, boardY, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        }
                    }
                }
            }
            if (tetrisGameOver) {
                tCtx.fillStyle = 'rgba(0,0,0,0.6)';
                tCtx.fillRect(0, 0, w, h);
                tCtx.fillStyle = '#ffe100';
                tCtx.font = 'bold 32px sans-serif';
                tCtx.textAlign = 'center';
                tCtx.textBaseline = 'middle';
                tCtx.fillText(__('tetrisGameOver'), w / 2, h / 2);
            }
        }

        function tetrisStep() {
            if (!tetrisPaused && !tetrisGameOver && tetrisPiece) {
                movePiece(0, 1);
            }
        }

        function startTetris() {
            if (tetrisInterval) return;
            initTetris();
            tetrisInterval = setInterval(tetrisStep, 400);
        }

        document.getElementById('tetrisStart').addEventListener('click', startTetris);
        document.getElementById('tetrisPause').addEventListener('click', () => {
            if (tetrisGameOver) return;
            tetrisPaused = !tetrisPaused;
            updateTetrisStatusText();
            drawTetris();
        });
        document.getElementById('tetrisReset').addEventListener('click', () => {
            clearInterval(tetrisInterval);
            tetrisInterval = null;
            initTetris();
        });

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('panel-tetris').classList.contains('active-panel')) {
                switch (e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        movePiece(-1, 0);
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        movePiece(1, 0);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        movePiece(0, 1);
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        rotatePiece();
                        break;
                }
            }
        });

        initTetris();

        // ============================================================
        //  9. 绘画板
        // ============================================================
        const paintCanvas = document.getElementById('paintCanvas');
        const pCtx = paintCanvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0,
            lastY = 0;
        let paintColor = '#ffe100';
        let paintSize = 8;
        let isEraser = false;

        function initPaint() {
            pCtx.fillStyle = '#0b0c14';
            pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
            pCtx.strokeStyle = paintColor;
            pCtx.lineWidth = paintSize;
            pCtx.lineCap = 'round';
            pCtx.lineJoin = 'round';
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = paintCanvas.getBoundingClientRect();
            const scaleX = paintCanvas.width / rect.width;
            const scaleY = paintCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            lastX = x;
            lastY = y;
            pCtx.beginPath();
            pCtx.arc(x, y, paintSize / 2, 0, Math.PI * 2);
            pCtx.fillStyle = isEraser ? '#0b0c14' : paintColor;
            pCtx.fill();
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = paintCanvas.getBoundingClientRect();
            const scaleX = paintCanvas.width / rect.width;
            const scaleY = paintCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            pCtx.strokeStyle = isEraser ? '#0b0c14' : paintColor;
            pCtx.lineWidth = paintSize;
            pCtx.beginPath();
            pCtx.moveTo(lastX, lastY);
            pCtx.lineTo(x, y);
            pCtx.stroke();
            lastX = x;
            lastY = y;
        }

        function stopDrawing() { isDrawing = false; }

        paintCanvas.addEventListener('mousedown', startDrawing);
        paintCanvas.addEventListener('mousemove', draw);
        paintCanvas.addEventListener('mouseup', stopDrawing);
        paintCanvas.addEventListener('mouseleave', stopDrawing);
