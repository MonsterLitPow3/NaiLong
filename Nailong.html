<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奶龙娱乐空间站✨游戏·绘画·小说</title>
    <style>
        /* ========== CSS变量 & 主题 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "PingFang SC", system-ui, sans-serif;
            transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
        }
        :root {
            --bg-body: #12141d;
            --bg-card: #1e202e;
            --bg-input: #272938;
            --bg-chat: #272938;
            --text-primary: #f8f9ff;
            --text-secondary: #b0b5cc;
            --border-color: #33364a;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --nav-bg: #1e202e;
            --yellow: #ffe100;
            --blue: #54c0ff;
            --pink: #ff6b8b;
            --red: #ff4466;
            --green: #44d47c;
            --card-radius: 16px;
            --nav-height: 64px;
        }
        [data-theme="light"] {
            --bg-body: #edf0f7;
            --bg-card: #ffffff;
            --bg-input: #e8ecf5;
            --bg-chat: #f0f3fa;
            --text-primary: #141624;
            --text-secondary: #4a4d66;
            --border-color: #d0d4e0;
            --shadow-color: rgba(0, 0, 0, 0.07);
            --nav-bg: #ffffff;
            --yellow: #e8c800;
            --blue: #3a8fcb;
            --pink: #d94a6e;
            --red: #cc3355;
            --green: #2aad6a;
        }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* ===== 导航栏 ===== */
        .nav-bar {
            width: 100%;
            height: var(--nav-height);
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
            border-bottom: 2px solid var(--yellow);
            position: sticky;
            top: 0;
            z-index: 999;
            flex-wrap: wrap;
            gap: 6px;
            box-shadow: 0 2px 16px var(--shadow-color);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: bold;
            color: var(--yellow);
            white-space: nowrap;
        }
        .logo span {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: normal;
            margin-left: 2px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            background: var(--bg-input);
            color: var(--text-secondary);
        }
        .nav-btn.active {
            transform: scale(1.04);
            box-shadow: 0 0 16px var(--yellow);
        }
        .nav-btn.btn-game.active {
            background: var(--yellow);
            color: #000;
        }
        .nav-btn.btn-story.active {
            background: var(--pink);
            color: #fff;
        }
        .nav-btn:hover {
            filter: brightness(1.15);
        }
        .ctrl-btn {
            padding: 4px 10px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            font-weight: 500;
        }
        .ctrl-btn:hover {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .ctrl-btn.active-ctrl {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .theme-group, .lang-group {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .theme-group .ctrl-btn, .lang-group .ctrl-btn {
            padding: 3px 8px;
            font-size: 11px;
        }
        .divider {
            color: var(--border-color);
            font-size: 16px;
            padding: 0 2px;
        }

        /* ===== 模块容器 ===== */
        .module {
            width: 95%;
            max-width: 1100px;
            margin: 18px auto;
            display: none;
            border-radius: var(--card-radius);
            padding: 20px;
            background: var(--bg-card);
            min-height: calc(100vh - 100px);
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .module.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 游戏模块 ===== */
        .game-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .game-tab {
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }
        .game-tab.active-tab {
            background: var(--yellow);
            color: #000;
            border-color: var(--yellow);
        }
        .game-tab:hover {
            filter: brightness(1.1);
        }
        .game-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .game-panel.active-panel {
            display: flex;
        }
        .game-canvas-wrap {
            width: 100%;
            max-width: 560px;
            aspect-ratio: 1 / 1;
            border: 3px solid var(--yellow);
            border-radius: 12px;
            overflow: hidden;
            background: #0b0c14;
            position: relative;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0b0c14;
            image-rendering: pixelated;
        }
        .game-control {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .game-btn {
            padding: 6px 22px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--yellow);
            color: #000;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
        }
        .game-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .game-status {
            font-weight: bold;
            padding: 4px 16px;
            border-radius: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            font-size: 14px;
        }
        .color-picker-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .color-picker-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .color-picker-group input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: none;
            cursor: pointer;
        }
        .brush-size {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brush-size input[type="range"] {
            width: 100px;
            accent-color: var(--yellow);
        }

        /* ===== 小说模块 ===== */
        .story-wrap { padding: 4px 0; }
        .story-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .story-head h2 { font-size: 19px; color: var(--pink); }
        .generate-story {
            padding: 9px 24px;
            border-radius: 10px;
            border: none;
            background: var(--red);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .generate-story:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .generate-story:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .story-content {
            padding: 20px 24px;
            background: var(--bg-input);
            border-radius: 12px;
            line-height: 2;
            font-size: 15px;
            text-indent: 2em;
            min-height: 400px;
            white-space: pre-line;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            max-height: 70vh;
            overflow-y: auto;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 28px;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 24px;
            display: none;
            z-index: 9999;
            border: 1px solid var(--yellow);
            box-shadow: 0 4px 24px var(--shadow-color);
            font-size: 14px;
            font-weight: 500;
            max-width: 92%;
            text-align: center;
        }

        /* ===== 滚动条 ===== */
        .story-content::-webkit-scrollbar {
            width: 5px;
        }
        .story-content::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        .story-content::-webkit-scrollbar-thumb {
            background: var(--yellow);
            border-radius: 4px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .nav-bar { padding: 0 10px; height: auto; min-height: 56px; }
            .logo { font-size: 15px; }
            .logo span { font-size: 11px; }
            .nav-btn { font-size: 11px; padding: 4px 10px; }
            .ctrl-btn { font-size: 10px; padding: 3px 7px; }
            .module { padding: 14px; width: 98%; margin: 12px auto; }
            .game-canvas-wrap { max-width: 100%; }
            .story-content { font-size: 14px; padding: 14px 18px; min-height: 280px; }
            .story-head h2 { font-size: 16px; }
            .nav-right { gap: 4px; }
            .theme-group .ctrl-btn, .lang-group .ctrl-btn { font-size: 10px; padding: 2px 6px; }
            .divider { font-size: 13px; }
            .game-tab { font-size: 12px; padding: 4px 14px; }
        }
        @media (max-width: 480px) {
            .nav-btn-group .nav-btn { font-size: 10px; padding: 3px 8px; }
            .logo { font-size: 13px; }
            .game-btn { font-size: 12px; padding: 4px 14px; }
            .story-content { font-size: 13px; padding: 12px 14px; min-height: 200px; }
            .game-tab { font-size: 11px; padding: 3px 10px; }
            .color-picker-group input[type="color"] { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
    <!-- ===== 导航 ===== -->
    <div class="nav-bar">
        <div class="logo">🐲 奶龙娱乐 <span id="logoSub">空间站</span></div>
        <div class="nav-right">
            <div class="nav-btn-group">
                <button class="nav-btn btn-game active" data-target="gameModule" data-key="navGame">🎮 游戏</button>
                <button class="nav-btn btn-story" data-target="storyModule" data-key="navStory">📖 末世文</button>
            </div>
            <span class="divider">|</span>
            <div class="theme-group">
                <button class="ctrl-btn active-ctrl" data-theme="dark" data-key="themeDark">🌙</button>
                <button class="ctrl-btn" data-theme="light" data-key="themeLight">☀️</button>
            </div>
            <span class="divider">|</span>
            <div class="lang-group">
                <button class="ctrl-btn active-ctrl" data-lang="zh" data-key="langZh">中文</button>
                <button class="ctrl-btn" data-lang="en" data-key="langEn">EN</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块1：游戏 ===== -->
    <div id="gameModule" class="module show">
        <div class="game-tabs" id="gameTabs">
            <button class="game-tab active-tab" data-game="goban">♟ 五子棋</button>
            <button class="game-tab" data-game="tetris">🧩 俄罗斯方块</button>
            <button class="game-tab" data-game="paint">🎨 绘画板</button>
        </div>

        <!-- 五子棋 -->
        <div class="game-panel active-panel" id="panel-goban">
            <div class="game-status" id="gobanStatus">黑棋走</div>
            <div class="game-canvas-wrap">
                <canvas id="gobanCanvas" width="600" height="600"></canvas>
            </div>
            <div class="game-control">
                <button class="game-btn" id="gobanReset">🔄 新游戏</button>
                <button class="game-btn" id="gobanUndo">↩ 悔棋</button>
            </div>
        </div>

        <!-- 俄罗斯方块 -->
        <div class="game-panel" id="panel-tetris">
            <div class="game-status" id="tetrisStatus">得分: 0</div>
            <div class="game-canvas-wrap" style="aspect-ratio: 10/20;">
                <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            </div>
            <div class="game-control">
                <button class="game-btn" id="tetrisStart">▶ 开始</button>
                <button class="game-btn" id="tetrisPause">⏸ 暂停</button>
                <button class="game-btn" id="tetrisReset">🔄 重置</button>
                <span class="game-hint" style="color:var(--text-secondary);font-size:13px;">⬅⬇➡ 移动 · ⬆ 旋转</span>
            </div>
        </div>

        <!-- 绘画板 -->
        <div class="game-panel" id="panel-paint">
            <div class="game-status" id="paintStatus">🎨 自由绘画</div>
            <div class="game-canvas-wrap" style="aspect-ratio: 4/3;">
                <canvas id="paintCanvas" width="800" height="600"></canvas>
            </div>
            <div class="game-control" style="flex-wrap:wrap; gap:10px;">
                <div class="color-picker-group">
                    <label>颜色</label>
                    <input type="color" id="paintColor" value="#ffe100">
                    <label>粗细</label>
                    <input type="range" id="paintSize" min="2" max="30" value="8">
                </div>
                <button class="game-btn" id="paintClear">🗑 清空</button>
                <button class="game-btn" id="paintEraser">🧽 橡皮</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块2：小说 ===== -->
    <div id="storyModule" class="module">
        <div class="story-wrap">
            <div class="story-head">
                <h2>🧟 <span data-key="storyTitle">抽象末世 · 奶龙重生复仇</span></h2>
                <button class="generate-story" id="createStory" data-key="storyGen">⚡ 生成全新篇章</button>
            </div>
            <div class="story-content" id="storyBox">
                <span data-key="storyPlaceholder">点击右侧按钮，生成一篇独一无二的末世重生复仇故事，每次完全不同。</span>
            </div>
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast">✨ 提示</div>

    <script>
        // ============================================================
        //  1. 语言 & 主题
        // ============================================================
        const LANG = {
            zh: {
                navGame: '🎮 游戏',
                navStory: '📖 末世文',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: '空间站',
                storyTitle: '抽象末世 · 奶龙重生复仇',
                storyGen: '⚡ 生成全新篇章',
                storyPlaceholder: '点击右侧按钮，生成一篇独一无二的末世重生复仇故事，每次完全不同。',
            },
            en: {
                navGame: '🎮 Games',
                navStory: '📖 Apocalypse',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: 'Station',
                storyTitle: 'Abstract Apocalypse · Revenge',
                storyGen: '⚡ Generate New',
                storyPlaceholder: 'Click to generate a unique apocalyptic revenge story. Completely different each time.',
            }
        };

        let currentLang = 'zh';
        let currentTheme = 'dark';

        function applyLang(lang) {
            currentLang = lang;
            const dict = LANG[lang];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (dict[key] !== undefined) {
                    if (el.tagName === 'INPUT' && el.placeholder !== undefined) {
                        el.placeholder = dict[key];
                    } else {
                        el.textContent = dict[key];
                    }
                }
            });
            const logoSub = document.getElementById('logoSub');
            if (logoSub) logoSub.textContent = dict.logoSub;
            document.querySelectorAll('.lang-group .ctrl-btn').forEach(btn => {
                btn.classList.toggle('active-ctrl', btn.dataset.lang === lang);
            });
        }

        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-group .ctrl-btn').forEach(btn => {
                btn.classList.toggle('active-ctrl', btn.dataset.theme === theme);
            });
        }

        document.querySelectorAll('.theme-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                applyTheme(btn.dataset.theme);
                showToast(btn.dataset.theme === 'dark' ? '🌙 暗色模式' : '☀️ 亮色模式');
                LocalDB.set('nailongTheme', btn.dataset.theme);
            });
        });
        document.querySelectorAll('.lang-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                applyLang(btn.dataset.lang);
                showToast(btn.dataset.lang === 'zh' ? '🇨🇳 中文' : '🇬🇧 English');
                LocalDB.set('nailongLang', btn.dataset.lang);
            });
        });

        const LocalDB = {
            set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
            get(key) { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; },
            del(key) { localStorage.removeItem(key); },
        };

        // ============================================================
        //  2. 导航切换
        // ============================================================
        const navBtns = document.querySelectorAll('.nav-btn');
        const modules = document.querySelectorAll('.module');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const target = btn.dataset.target;
                modules.forEach(m => m.classList.remove('show'));
                document.getElementById(target).classList.add('show');
            });
        });

        // ============================================================
        //  3. Toast
        // ============================================================
        const Toast = document.getElementById('toast');
        let toastTimer = null;

        function showToast(text) {
            Toast.textContent = text;
            Toast.style.display = 'block';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { Toast.style.display = 'none'; }, 2200);
        }

        // ============================================================
        //  4. 游戏选项卡切换
        // ============================================================
        const tabs = document.querySelectorAll('.game-tab');
        const panels = {
            goban: document.getElementById('panel-goban'),
            tetris: document.getElementById('panel-tetris'),
            paint: document.getElementById('panel-paint'),
        };

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active-tab'));
                tab.classList.add('active-tab');
                const game = tab.dataset.game;
                Object.keys(panels).forEach(key => {
                    panels[key].classList.toggle('active-panel', key === game);
                });
                // 重新绘制对应游戏
                if (game === 'goban') drawGoban();
                else if (game === 'tetris') drawTetris();
                else if (game === 'paint') { /* 无需重绘 */ }
            });
        });

        // ============================================================
        //  5. 五子棋 (人机对战)
        // ============================================================
        const gobanCanvas = document.getElementById('gobanCanvas');
        const gCtx = gobanCanvas.getContext('2d');
        const BOARD_SIZE = 15;
        const CELL_SIZE = gobanCanvas.width / (BOARD_SIZE + 1);
        let gobanBoard = [];
        let gobanTurn = 'black'; // 'black' 或 'white'
        let gameOver = false;
        let gobanHistory = [];

        function initGoban() {
            gobanBoard = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
            gobanTurn = 'black';
            gameOver = false;
            gobanHistory = [];
            document.getElementById('gobanStatus').textContent = '黑棋走';
            drawGoban();
        }

        function drawGoban() {
            const w = gobanCanvas.width, h = gobanCanvas.height;
            gCtx.clearRect(0, 0, w, h);
            // 背景
            gCtx.fillStyle = '#d4b48c';
            gCtx.fillRect(0, 0, w, h);
            // 网格
            gCtx.strokeStyle = '#000';
            gCtx.lineWidth = 1;
            const offset = CELL_SIZE;
            for (let i = 0; i < BOARD_SIZE; i++) {
                gCtx.beginPath();
                gCtx.moveTo(offset, offset + i * CELL_SIZE);
                gCtx.lineTo(offset + (BOARD_SIZE - 1) * CELL_SIZE, offset + i * CELL_SIZE);
                gCtx.stroke();
                gCtx.beginPath();
                gCtx.moveTo(offset + i * CELL_SIZE, offset);
                gCtx.lineTo(offset + i * CELL_SIZE, offset + (BOARD_SIZE - 1) * CELL_SIZE);
                gCtx.stroke();
            }
            // 星位
            const stars = [
                [3, 3],
                [3, 11],
                [11, 3],
                [11, 11],
                [7, 7]
            ];
            gCtx.fillStyle = '#000';
            stars.forEach(([x, y]) => {
                gCtx.beginPath();
                gCtx.arc(offset + x * CELL_SIZE, offset + y * CELL_SIZE, 4, 0, Math.PI * 2);
                gCtx.fill();
            });
            // 棋子
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const val = gobanBoard[y][x];
                    if (!val) continue;
                    const cx = offset + x * CELL_SIZE;
                    const cy = offset + y * CELL_SIZE;
                    const grad = gCtx.createRadialGradient(cx - 4, cy - 4, 4, cx, cy, CELL_SIZE * 0.45);
                    if (val === 'black') {
                        grad.addColorStop(0, '#1a1a1a');
                        grad.addColorStop(1, '#000');
                    } else {
                        grad.addColorStop(0, '#f9f9f9');
                        grad.addColorStop(1, '#ccc');
                    }
                    gCtx.beginPath();
                    gCtx.arc(cx, cy, CELL_SIZE * 0.42, 0, Math.PI * 2);
                    gCtx.fillStyle = grad;
                    gCtx.fill();
                    gCtx.shadowColor = 'rgba(0,0,0,0.3)';
                    gCtx.shadowBlur = 6;
                    gCtx.fill();
                    gCtx.shadowBlur = 0;
                }
            }
        }

        // 检查五子连珠
        function checkWin(row, col, color) {
            const directions = [
                [1, 0],
                [0, 1],
                [1, 1],
                [1, -1]
            ];
            for (const [dx, dy] of directions) {
                let count = 1;
                for (let step = 1; step < 5; step++) {
                    const nx = col + dx * step,
                        ny = row + dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else break;
                }
                for (let step = 1; step < 5; step++) {
                    const nx = col - dx * step,
                        ny = row - dy * step;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (gobanBoard[ny][nx] === color) count++;
                    else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        // 检查是否平局
        function isBoardFull() {
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (!gobanBoard[y][x]) return false;
                }
            }
            return true;
        }

        // 玩家下棋
        function gobanPlace(row, col) {
            if (gameOver) return;
            if (gobanTurn !== 'black') return;
            if (gobanBoard[row][col]) return;
            gobanBoard[row][col] = 'black';
            gobanHistory.push({ row, col, color: 'black' });
            drawGoban();
            if (checkWin(row, col, 'black')) {
                document.getElementById('gobanStatus').textContent = '🎉 你赢了！';
                gameOver = true;
                return;
            }
            if (isBoardFull()) {
                document.getElementById('gobanStatus').textContent = '🤝 平局';
                gameOver = true;
                return;
            }
            gobanTurn = 'white';
            document.getElementById('gobanStatus').textContent = 'AI思考中...';
            // AI走棋
            setTimeout(() => {
                aiMove();
            }, 100);
        }

        // AI 简单评分算法
        function evaluateDirection(row, col, color, dx, dy) {
            let count = 1;
            let openLeft = 0,
                openRight = 0;
            // 正方向
            for (let step = 1; step < 5; step++) {
                const nx = col + dx * step,
                    ny = row + dy * step;
                if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                if (gobanBoard[ny][nx] === color) count++;
                else if (gobanBoard[ny][nx] === null) { openRight++; break; } else break;
            }
            // 反方向
            for (let step = 1; step < 5; step++) {
                const nx = col - dx * step,
                    ny = row - dy * step;
                if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                if (gobanBoard[ny][nx] === color) count++;
                else if (gobanBoard[ny][nx] === null) { openLeft++; break; } else break;
            }
            // 评分：连子数+开放度
            let score = count * 10;
            if (count >= 5) score += 1000;
            if (openLeft > 0) score += 5;
            if (openRight > 0) score += 5;
            return score;
        }

        function evaluatePoint(row, col, color) {
            if (gobanBoard[row][col]) return 0;
            let total = 0;
            const dirs = [
                [1, 0],
                [0, 1],
                [1, 1],
                [1, -1]
            ];
            for (const [dx, dy] of dirs) {
                total += evaluateDirection(row, col, color, dx, dy);
            }
            return total;
        }

        function aiMove() {
            if (gameOver) return;
            let bestScore = -1;
            let bestMoves = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (gobanBoard[y][x]) continue;
                    const score = evaluatePoint(y, x, 'white');
                    if (score > bestScore) {
                        bestScore = score;
                        bestMoves = [{ row: y, col: x }];
                    } else if (score === bestScore) {
                        bestMoves.push({ row: y, col: x });
                    }
                }
            }
            if (bestMoves.length === 0) {
                // 无可用位置，平局
                if (isBoardFull()) {
                    document.getElementById('gobanStatus').textContent = '🤝 平局';
                    gameOver = true;
                }
                return;
            }
            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            gobanBoard[move.row][move.col] = 'white';
            gobanHistory.push({ row: move.row, col: move.col, color: 'white' });
            drawGoban();
            if (checkWin(move.row, move.col, 'white')) {
                document.getElementById('gobanStatus').textContent = '😵 AI赢了...';
                gameOver = true;
                return;
            }
            if (isBoardFull()) {
                document.getElementById('gobanStatus').textContent = '🤝 平局';
                gameOver = true;
                return;
            }
            gobanTurn = 'black';
            document.getElementById('gobanStatus').textContent = '黑棋走';
        }

        // 五子棋事件
        gobanCanvas.addEventListener('click', (e) => {
            const rect = gobanCanvas.getBoundingClientRect();
            const scaleX = gobanCanvas.width / rect.width;
            const scaleY = gobanCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            const offset = CELL_SIZE;
            const col = Math.round((x - offset) / CELL_SIZE);
            const row = Math.round((y - offset) / CELL_SIZE);
            if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
            gobanPlace(row, col);
        });

        document.getElementById('gobanUndo').addEventListener('click', () => {
            if (gameOver) return;
            if (gobanHistory.length < 2) return;
            // 撤回两步（玩家和AI各一步）
            for (let i = 0; i < 2; i++) {
                const last = gobanHistory.pop();
                if (last) gobanBoard[last.row][last.col] = null;
            }
            gobanTurn = 'black';
            document.getElementById('gobanStatus').textContent = '黑棋走';
            drawGoban();
        });

        initGoban();

        // ============================================================
        //  6. 俄罗斯方块 (单人)
        // ============================================================
        const tetrisCanvas = document.getElementById('tetrisCanvas');
        const tCtx = tetrisCanvas.getContext('2d');
        const TETRIS_COLS = 10,
            TETRIS_ROWS = 20;
        const BLOCK_SIZE = tetrisCanvas.width / TETRIS_COLS;
        let tetrisBoard = [];
        let tetrisPiece = null;
        let tetrisScore = 0;
        let tetrisGameOver = false;
        let tetrisPaused = false;
        let tetrisInterval = null;

        const PIECES = [
            { shape: [
                    [1, 1, 1, 1]
                ], color: '#54c0ff' }, // I
            { shape: [
                    [1, 1],
                    [1, 1]
                ], color: '#ffe100' }, // O
            { shape: [
                    [0, 1, 0],
                    [1, 1, 1]
                ], color: '#ff6b8b' }, // T
            { shape: [
                    [1, 0, 0],
                    [1, 1, 1]
                ], color: '#ff4466' }, // L
            { shape: [
                    [0, 0, 1],
                    [1, 1, 1]
                ], color: '#44d47c' }, // J
            { shape: [
                    [0, 1, 1],
                    [1, 1, 0]
                ], color: '#ffaa22' }, // S
            { shape: [
                    [1, 1, 0],
                    [0, 1, 1]
                ], color: '#9955ff' }, // Z
        ];

        function initTetris() {
            tetrisBoard = Array.from({ length: TETRIS_ROWS }, () => Array(TETRIS_COLS).fill(0));
            tetrisScore = 0;
            tetrisGameOver = false;
            tetrisPaused = false;
            clearInterval(tetrisInterval);
            tetrisInterval = null;
            document.getElementById('tetrisStatus').textContent = '得分: 0';
            spawnPiece();
            drawTetris();
        }

        function spawnPiece() {
            if (tetrisGameOver) return;
            const idx = Math.floor(Math.random() * PIECES.length);
            const piece = PIECES[idx];
            tetrisPiece = {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor((TETRIS_COLS - piece.shape[0].length) / 2),
                y: 0,
            };
            if (collision(tetrisPiece.shape, tetrisPiece.x, tetrisPiece.y)) {
                tetrisGameOver = true;
                document.getElementById('tetrisStatus').textContent = '💀 游戏结束';
                clearInterval(tetrisInterval);
                tetrisInterval = null;
                drawTetris();
                return;
            }
            drawTetris();
        }

        function collision(shape, offX, offY) {
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[0].length; x++) {
                    if (shape[y][x]) {
                        const boardX = offX + x;
                        const boardY = offY + y;
                        if (boardX < 0 || boardX >= TETRIS_COLS || boardY >= TETRIS_ROWS || boardY < 0) return true;
                        if (boardY >= 0 && tetrisBoard[boardY][boardX]) return true;
                    }
                }
            }
            return false;
        }

        function lockPiece() {
            if (!tetrisPiece) return;
            const { shape, x, y, color } = tetrisPiece;
            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[0].length; col++) {
                    if (shape[row][col]) {
                        const boardY = y + row;
                        const boardX = x + col;
                        if (boardY >= 0 && boardY < TETRIS_ROWS && boardX >= 0 && boardX < TETRIS_COLS) {
                            tetrisBoard[boardY][boardX] = color;
                        }
                    }
                }
            }
            // 消除满行
            let cleared = 0;
            for (let row = TETRIS_ROWS - 1; row >= 0; ) {
                if (tetrisBoard[row].every(cell => cell !== 0)) {
                    tetrisBoard.splice(row, 1);
                    tetrisBoard.unshift(Array(TETRIS_COLS).fill(0));
                    cleared++;
                } else {
                    row--;
                }
            }
            if (cleared > 0) {
                tetrisScore += cleared * 100;
                document.getElementById('tetrisStatus').textContent = `得分: ${tetrisScore}`;
            }
            spawnPiece();
            drawTetris();
        }

        function movePiece(dx, dy) {
            if (!tetrisPiece || tetrisGameOver || tetrisPaused) return;
            const { shape, x, y } = tetrisPiece;
            if (!collision(shape, x + dx, y + dy)) {
                tetrisPiece.x += dx;
                tetrisPiece.y += dy;
                drawTetris();
            } else if (dy === 1) {
                lockPiece();
            }
        }

        function rotatePiece() {
            if (!tetrisPiece || tetrisGameOver || tetrisPaused) return;
            const oldShape = tetrisPiece.shape;
            const rotated = oldShape[0].map((val, index) => oldShape.map(row => row[index]).reverse());
            if (!collision(rotated, tetrisPiece.x, tetrisPiece.y)) {
                tetrisPiece.shape = rotated;
                drawTetris();
            } else {
                // 踢墙简单处理
                if (!collision(rotated, tetrisPiece.x - 1, tetrisPiece.y)) {
                    tetrisPiece.shape = rotated;
                    tetrisPiece.x -= 1;
                    drawTetris();
                } else if (!collision(rotated, tetrisPiece.x + 1, tetrisPiece.y)) {
                    tetrisPiece.shape = rotated;
                    tetrisPiece.x += 1;
                    drawTetris();
                }
            }
        }

        function drawTetris() {
            const w = tetrisCanvas.width,
                h = tetrisCanvas.height;
            tCtx.clearRect(0, 0, w, h);
            // 棋盘
            tCtx.fillStyle = '#0b0c14';
            tCtx.fillRect(0, 0, w, h);
            for (let row = 0; row < TETRIS_ROWS; row++) {
                for (let col = 0; col < TETRIS_COLS; col++) {
                    const color = tetrisBoard[row][col];
                    if (color) {
                        tCtx.fillStyle = color;
                        tCtx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                    }
                }
            }
            // 当前方块
            if (tetrisPiece) {
                const { shape, x, y, color } = tetrisPiece;
                tCtx.fillStyle = color;
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[0].length; col++) {
                        if (shape[row][col]) {
                            const boardX = (x + col) * BLOCK_SIZE;
                            const boardY = (y + row) * BLOCK_SIZE;
                            tCtx.fillRect(boardX, boardY, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                        }
                    }
                }
            }
            if (tetrisGameOver) {
                tCtx.fillStyle = 'rgba(0,0,0,0.5)';
                tCtx.fillRect(0, 0, w, h);
                tCtx.fillStyle = '#ffe100';
                tCtx.font = 'bold 28px sans-serif';
                tCtx.textAlign = 'center';
                tCtx.textBaseline = 'middle';
                tCtx.fillText('💀 GAME OVER', w / 2, h / 2);
            }
        }

        function tetrisStep() {
            if (!tetrisPaused && !tetrisGameOver && tetrisPiece) {
                movePiece(0, 1);
            }
        }

        function startTetris() {
            if (tetrisInterval) return;
            initTetris();
            tetrisInterval = setInterval(tetrisStep, 400);
        }

        document.getElementById('tetrisStart').addEventListener('click', startTetris);
        document.getElementById('tetrisPause').addEventListener('click', () => {
            if (tetrisGameOver) return;
            tetrisPaused = !tetrisPaused;
            document.getElementById('tetrisStatus').textContent = tetrisPaused ? '⏸ 暂停' : `得分: ${tetrisScore}`;
            drawTetris();
        });
        document.getElementById('tetrisReset').addEventListener('click', () => {
            clearInterval(tetrisInterval);
            tetrisInterval = null;
            initTetris();
        });

        // 键盘
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('panel-tetris').classList.contains('active-panel')) {
                switch (e.key) {
                    case 'ArrowLeft':
                        e.preventDefault();
                        movePiece(-1, 0);
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        movePiece(1, 0);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        movePiece(0, 1);
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        rotatePiece();

                }
            }
        });

        // ============================================================
        const paintCanvas = document.getElementById('paintCanvas');
        const pCtx = paintCanvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0,
            lastY = 0;
        let paintColor = '#ffe100';
        let paintSize = 8;
        let isEraser = false;

        function initPaint() {
            pCtx.fillStyle = '#0b0c14';
            pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
            pCtx.strokeStyle = paintColor;
            pCtx.lineWidth = paintSize;
            pCtx.lineCap = 'round';
            pCtx.lineJoin = 'round';
        }

        function startDrawing(e) {
            isDrawing = true;
            const rect = paintCanvas.getBoundingClientRect();
            const scaleX = paintCanvas.width / rect.width;
            const scaleY = paintCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            lastX = x;
            lastY = y;
            pCtx.beginPath();
            pCtx.arc(x, y, paintSize / 2, 0, Math.PI * 2);
            pCtx.fillStyle = isEraser ? '#0b0c14' : paintColor;
            pCtx.fill();
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = paintCanvas.getBoundingClientRect();
            const scaleX = paintCanvas.width / rect.width;
            const scaleY = paintCanvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            pCtx.strokeStyle = isEraser ? '#0b0c14' : paintColor;
            pCtx.lineWidth = paintSize;
            pCtx.beginPath();
            pCtx.moveTo(lastX, lastY);
            pCtx.lineTo(x, y);
            pCtx.stroke();
            lastX = x;
            lastY = y;
        }

        function stopDrawing() {
            isDrawing = false;
        }

        paintCanvas.addEventListener('mousedown', startDrawing);
        paintCanvas.addEventListener('mousemove', draw);
        paintCanvas.addEventListener('mouseup', stopDrawing);
        paintCanvas.addEventListener('mouseleave', stopDrawing);

            e.preventDefault();

                '隐藏设定：每一次重生都会让世界更接近终极毁灭',
                '奶龙触碰世界边缘，发现外面还有无数个平行末世',
                '其实奶龙从未离开过祭坛，所有经历都是精神折磨',
                '奶龙发现自己的记忆被篡改，真相截然相反',
                '末世本身是一个巨大的实验场，奶龙是唯一的变量'
            ],
            scene: [
                '血月当空，骸骨铺就的荒原上，奶龙独自前行。',
                '霓虹残骸中闪烁的数据流，映照着奶龙冰冷的眼神。',
                '酸雨倾盆，奶龙在废墟中挖掘出前世的记忆碎片。',
                '倒置的钟楼悬于天际，指针逆时针疯狂旋转。',
                '焦土上盛开诡异的血色花朵，每一朵都藏着诅咒。',
                '奶龙踏入镜像湖面，湖水映出无数个不同命运的自我。',
                '天空裂开巨缝，蠕动的黑暗伸出触手试探地面。',
                '废弃的机甲群中，奶龙发现了一具与己身相似的骸骨。',
                '风暴中传来远古的呼唤，奶龙循声走向未知。',
                '地表突然塌陷，奶龙坠入地底深处的光之遗迹。',
                '奶龙在枯萎的巨树前，树皮上刻满了前世的预言。',
                '海面浮现巨大的漩涡，奶龙纵身跃入其中。'
            ],
            name: ['烬', '骸', '霜', '胧', '魇', '墟', '渊', '凛', '噬', '苍', '冥', '幽', '绝', '荒', '寂', '灭', '殁'],
            title: [
                '万次重生复仇录', '末世挽歌', '蛋黄神域陨落纪', '轮回猎杀',
                '深渊觉醒', '混沌纪元', '终焉审判', '虚无彼岸',
                '因果崩坏', '时序逆乱', '噬神之章', '归墟之途'
            ]
        };

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generateEpicStory() {
            const w = pick(WORD.world);
            const a = pick(WORD.ability);
            const e = pick(WORD.enemy);
            const r = pick(WORD.rule);
            const p = pick(WORD.plot);
            const ed = pick(WORD.end);
            const tw = pick(WORD.twist);
            const sc1 = pick(WORD.scene);
            const sc2 = pick(WORD.scene);
            const sc3 = pick(WORD.scene);
            const sc4 = pick(WORD.scene);
            const name = pick(WORD.name);
            const title = pick(WORD.title);

            const parts = [
                `# 《${w}》· 奶龙「${name}」${title}\n`,
                `## ▎序章 · 末世铁律\n`,
                `在这片支离破碎的${w}上，万物遵循着一条残酷的铁律：${r}。\n`,
                `奶龙${name}生于浮空蛋黄神域，族群世代制衡地底僵尸族群。而地底深处，${e}正悄然崛起，觊觎着地表的一切。\n\n`,
                `## ▎前世 · 血与背叛\n`,
                `万次轮回之前，奶龙${name}历尽宿命劫难：${p}。\n`,
                `${sc1}\n`,
                `末世酸雨腐蚀龙鳞，僵尸奶娃撕毁族群契约，啃食奶龙的情绪本源，将其封印在时间夹缝中，永世承受濒死痛感。\n\n`,
                `## ▎觉醒 · 禁忌之力\n`,
                `濒死刹那，奶龙${name}触发天赋异能【${a}】，挣脱生死判定，开启闭环重生。\n`,
                `${sc2}\n`,
                `每一次重生，世界逻辑都会随机篡改：树木流淌血液、僵尸惧怕黄色光源、奶娃会复刻奶龙神态博取同情、昼夜时间无序颠倒。\n`,
                `没有绝对善恶，没有固定战力数值，所有规则随复仇进度随机崩塌重构。\n\n`,
                `## ▎征途 · 荒原猎杀\n`,
                `奶龙${name}不再救赎人类，不再心软共情同族。\n`,
                `${sc3}\n`,
                `踏遍腐朽楼宇、骸骨荒原、倒置深海，猎杀所有异化奶娃，撕碎当年背叛真相。\n`,
                `在无数次生死边缘，奶龙逐渐触摸到末世最深处的秘密……\n\n`,
                `## ▎惊天反转 · 真相浮现\n`,
                `${tw}\n`,
                `${sc4}\n`,
                `这个发现彻底动摇了奶龙的复仇信念，也揭开了末世存在的真正意义。\n\n`,
                `## ▎最终抉择 · 宿命终章\n`,
                `本次轮回的最终宿命：${ed}。\n`,
                `奶龙${name}站在时空的十字路口，凝视着无数个平行自我，做出了最终选择。\n\n`,
                `---\n`,
                `【本故事纯属抽象虚构 · 无科学逻辑 · 无世界观闭环 · 随机生成仅此一篇】\n`,
                `🐲 奶龙专属 · 末世复仇史诗 · 万次重生永不完结\n`,
                `✨ 生成时间：${new Date().toLocaleString()}`
            ];
            return parts.join('\n');
        }

        function generateAndSaveStory() {
            const btn = document.getElementById('createStory');
            btn.disabled = true;
            btn.textContent = '⏳ 生成中...';
            setTimeout(() => {
                const story = generateEpicStory();
                storyBox.textContent = story;
                LocalDB.set('lastNailongStory', story);
                showToast('📜 全新超长末世篇章生成完毕！');
                btn.disabled = false;
                btn.textContent = LANG[currentLang].storyGen || '⚡ 生成全新篇章';
            }, 300);
        }

        document.getElementById('createStory').addEventListener('click', generateAndSaveStory);
        const oldStory = LocalDB.get('lastNailongStory');
        if (oldStory) storyBox.textContent = oldStory;

        // ============================================================
        //  9. 初始化主题/语言
        // ============================================================
        const savedTheme = LocalDB.get('nailongTheme') || 'dark';
        applyTheme(savedTheme);
        const savedLang = LocalDB.get('nailongLang') || 'zh';
        applyLang(savedLang);

        console.log('🐲 奶龙娱乐空间站 已启动 ✨');
        console.log('📦 主题:', currentTheme, ' 语言:', currentLang);
        console.log('🎮 游戏: 五子棋(人机) | 俄罗斯方块 | 绘画板');
        console.log('📖 末世文: 超丰富随机生成');
    </script>
</body>
</html>
