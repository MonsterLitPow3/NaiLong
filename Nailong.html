<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龙AI助理空间站✨专属陪伴助手</title>
    <style>
        /* ========== CSS变量 & 主题系统 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "PingFang SC", sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        :root {
            /* 暗色主题 (默认) */
            --bg-body: #12141d;
            --bg-card: #1e202e;
            --bg-input: #272938;
            --bg-chat: #272938;
            --text-primary: #f8f9ff;
            --text-secondary: #b0b5cc;
            --border-color: #33364a;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --nav-bg: #1e202e;
            --yellow: #ffe100;
            --blue: #54c0ff;
            --pink: #ff6b8b;
            --red: #ff4466;
            --card-radius: 16px;
            --nav-height: 70px;
        }
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-body: #f0f2f7;
            --bg-card: #ffffff;
            --bg-input: #e8ecf5;
            --bg-chat: #eef1f8;
            --text-primary: #1a1c2e;
            --text-secondary: #4a4d66;
            --border-color: #d0d4e0;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --nav-bg: #ffffff;
            --yellow: #f5c800;
            --blue: #3a8fcb;
            --pink: #e0557a;
            --red: #d9385a;
        }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* ========== 导航栏 ========== */
        .nav-bar {
            width: 100%;
            height: var(--nav-height);
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 2px solid var(--yellow);
            position: sticky;
            top: 0;
            z-index: 999;
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            font-weight: bold;
            color: var(--yellow);
            white-space: nowrap;
        }
        .logo span {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: normal;
            margin-left: 4px;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .nav-btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s all;
            font-weight: 600;
            background: var(--bg-input);
            color: var(--text-secondary);
        }
        .nav-btn.active {
            transform: scale(1.04);
            box-shadow: 0 0 14px var(--yellow);
        }
        .nav-btn.btn-game.active {
            background: var(--yellow);
            color: #000;
        }
        .nav-btn.btn-ai.active {
            background: var(--blue);
            color: #fff;
        }
        .nav-btn.btn-story.active {
            background: var(--pink);
            color: #fff;
        }
        .nav-btn:hover {
            filter: brightness(1.15);
        }
        /* 主题/语言切换按钮 */
        .ctrl-btn {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            font-weight: 500;
        }
        .ctrl-btn:hover {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .ctrl-btn.active-ctrl {
            border-color: var(--yellow);
            background: var(--yellow);
            color: #000;
        }
        .theme-group,
        .lang-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .theme-group .ctrl-btn,
        .lang-group .ctrl-btn {
            padding: 4px 10px;
            font-size: 12px;
        }
        .divider {
            color: var(--border-color);
            font-size: 18px;
            padding: 0 2px;
        }

        /* ========== 模块容器 ========== */
        .module {
            width: 95%;
            max-width: 1200px;
            margin: 24px auto;
            display: none;
            border-radius: var(--card-radius);
            padding: 24px;
            background: var(--bg-card);
            min-height: calc(100vh - 130px);
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .module.show {
            display: block;
            animation: fadeIn 0.35s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 模块1：游戏 ========== */
        .game-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .game-info {
            display: flex;
            gap: 30px;
            font-size: 17px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-info span {
            background: var(--bg-input);
            padding: 4px 16px;
            border-radius: 20px;
        }
        #gameCanvas {
            border: 3px solid var(--yellow);
            border-radius: 12px;
            background: #0b0c14;
            max-width: 100%;
            height: auto;
        }
        .game-control {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .game-btn {
            padding: 6px 22px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--yellow);
            color: #000;
            font-weight: bold;
            font-size: 15px;
            transition: 0.2s;
        }
        .game-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .game-hint {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* ========== 模块2：AI对话 ========== */
        .ai-wrap {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .ai-top-info {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px 14px 4px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 8px;
            font-size: 14px;
        }
        .ai-top-info .ai-brand {
            color: var(--yellow);
            font-weight: 600;
        }
        .ai-top-info .ai-credit {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .location-tip {
            color: var(--blue);
            font-size: 13px;
        }
        .chat-box {
            flex: 1;
            margin: 16px 0;
            padding: 16px;
            border-radius: 12px;
            background: var(--bg-chat);
            overflow-y: auto;
            height: 460px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--border-color);
        }
        .msg-self {
            align-self: flex-end;
            background: var(--blue);
            color: #fff;
            padding: 10px 18px;
            border-radius: 18px 18px 4px 18px;
            max-width: 78%;
            word-break: break-word;
            font-size: 15px;
        }
        .msg-nailong {
            align-self: flex-start;
            background: var(--yellow);
            color: #000;
            padding: 10px 18px;
            border-radius: 18px 18px 18px 4px;
            max-width: 78%;
            word-break: break-word;
            font-size: 15px;
        }
        .msg-nailong .ai-badge {
            font-size: 11px;
            opacity: 0.6;
            display: block;
            margin-top: 4px;
            font-weight: normal;
        }
        .input-bar {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        #aiInput {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        #aiInput:focus {
            border-color: var(--yellow);
        }
        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--yellow);
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            color: #000;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: scale(1.06);
        }

        /* ========== 模块3：小说 ========== */
        .story-wrap {
            padding: 4px 0;
        }
        .story-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .story-head h2 {
            font-size: 20px;
            color: var(--pink);
        }
        .generate-story {
            padding: 10px 26px;
            border-radius: 10px;
            border: none;
            background: var(--red);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }
        .generate-story:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }
        .story-content {
            padding: 22px 26px;
            background: var(--bg-input);
            border-radius: 12px;
            line-height: 2;
            font-size: 16px;
            text-indent: 2em;
            min-height: 420px;
            white-space: pre-line;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 28px;
            background: var(--bg-card);
            color: var(--text-primary);
            border-radius: 24px;
            display: none;
            z-index: 9999;
            border: 1px solid var(--yellow);
            box-shadow: 0 4px 20px var(--shadow-color);
            font-size: 14px;
            font-weight: 500;
            max-width: 90%;
            text-align: center;
        }

        /* ========== 滚动条美化 ========== */
        .chat-box::-webkit-scrollbar,
        .story-content::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track,
        .story-content::-webkit-scrollbar-track {
            background: var(--bg-input);
            border-radius: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb,
        .story-content::-webkit-scrollbar-thumb {
            background: var(--yellow);
            border-radius: 4px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .nav-bar {
                padding: 0 12px;
                height: auto;
                min-height: 60px;
            }
            .logo {
                font-size: 16px;
            }
            .logo span {
                font-size: 11px;
            }
            .nav-btn {
                font-size: 12px;
                padding: 4px 12px;
            }
            .ctrl-btn {
                font-size: 11px;
                padding: 3px 8px;
            }
            .module {
                padding: 16px;
                width: 98%;
            }
            .game-info {
                font-size: 14px;
                gap: 14px;
            }
            #gameCanvas {
                width: 100%;
                height: auto;
                aspect-ratio: 560/420;
            }
            .chat-box {
                height: 320px;
            }
            .story-content {
                font-size: 14px;
                padding: 16px;
                min-height: 300px;
            }
            .story-head h2 {
                font-size: 16px;
            }
            .nav-right {
                gap: 4px;
            }
            .theme-group .ctrl-btn,
            .lang-group .ctrl-btn {
                font-size: 10px;
                padding: 2px 6px;
            }
            .divider {
                font-size: 14px;
            }
            .ai-top-info {
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            .nav-btn-group .nav-btn {
                font-size: 10px;
                padding: 3px 8px;
            }
            .logo {
                font-size: 13px;
            }
            .game-info span {
                padding: 2px 10px;
                font-size: 12px;
            }
            .game-btn {
                font-size: 12px;
                padding: 4px 14px;
            }
            #aiInput {
                font-size: 13px;
                padding: 10px 14px;
            }
            .send-btn {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 顶部导航 ===== -->
    <div class="nav-bar">
        <div class="logo">🐲 奶龙AI助理 <span id="logoSub">空间站</span></div>
        <div class="nav-right">
            <div class="nav-btn-group">
                <button class="nav-btn btn-game active" data-target="gameModule" data-key="navGame">🎮 吃奶娃</button>
                <button class="nav-btn btn-ai" data-target="aiModule" data-key="navAI">💬 AI对话</button>
                <button class="nav-btn btn-story" data-target="storyModule" data-key="navStory">📖 末世文</button>
            </div>
            <span class="divider">|</span>
            <div class="theme-group">
                <button class="ctrl-btn active-ctrl" data-theme="dark" data-key="themeDark">🌙</button>
                <button class="ctrl-btn" data-theme="light" data-key="themeLight">☀️</button>
            </div>
            <span class="divider">|</span>
            <div class="lang-group">
                <button class="ctrl-btn active-ctrl" data-lang="zh" data-key="langZh">中文</button>
                <button class="ctrl-btn" data-lang="en" data-key="langEn">EN</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块1：游戏 ===== -->
    <div id="gameModule" class="module show">
        <div class="game-wrap">
            <div class="game-info">
                <span>⭐ <span data-key="gameScoreLabel">得分</span>：<span id="gameScore">0</span></span>
                <span>❤️ <span data-key="gameLifeLabel">生命</span>：<span id="gameLife">3</span></span>
                <span>💾 <span data-key="gameSaveLabel">自动存档</span></span>
            </div>
            <canvas id="gameCanvas" width="560" height="420"></canvas>
            <div class="game-control">
                <button class="game-btn" id="startGame" data-key="gameStart">▶ 开始</button>
                <button class="game-btn" id="resetGame" data-key="gameReset">🔄 重置</button>
                <span class="game-hint" data-key="gameHint">⬆⬇⬅➡ 方向键操控 · 吃光点 · 躲奶娃</span>
            </div>
        </div>
    </div>

    <!-- ===== 模块2：AI对话 ===== -->
    <div id="aiModule" class="module">
        <div class="ai-wrap">
            <div class="ai-top-info">
                <span>
                    <span class="ai-brand">🐲 专属奶龙AI</span>
                    <span class="ai-credit" id="aiCredit"> · 由青云客智能API驱动</span>
                </span>
                <span class="location-tip" id="locationText">📍 <span data-key="locLoading">定位加载中...</span></span>
            </div>
            <div class="chat-box" id="chatBox">
                <div class="msg-nailong">
                    🥰 哈喽！我是专属奶龙 · 全域AI助理<br>
                    <span style="font-size:13px;opacity:0.7;">
                        🌤️ 查天气 · 🔥 看热搜 · 💬 任意聊天 · 📝 本地记忆
                    </span>
                    <span class="ai-badge">✨ AI实时响应</span>
                </div>
            </div>
            <div class="input-bar">
                <input type="text" id="aiInput" placeholder="输入任何你想说的话…" data-key="aiPlaceholder">
                <button class="send-btn" id="sendMsg">➤</button>
            </div>
        </div>
    </div>

    <!-- ===== 模块3：小说 ===== -->
    <div id="storyModule" class="module">
        <div class="story-wrap">
            <div class="story-head">
                <h2>🧟 <span data-key="storyTitle">抽象末世 · 奶龙重生复仇</span></h2>
                <button class="generate-story" id="createStory" data-key="storyGen">⚡ 生成全新篇章</button>
            </div>
            <div class="story-content" id="storyBox">
                <span data-key="storyPlaceholder">点击右侧按钮，生成无逻辑、超抽象、闭环重生末世复仇网文，剧情随机永不重复，自动本地缓存。</span>
            </div>
        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div class="toast" id="toast">✨ 提示</div>

    <script>
        // ============================================================
        //  1. 语言 & 主题 系统
        // ============================================================
        const LANG = {
            zh: {
                navGame: '🎮 吃奶娃',
                navAI: '💬 AI对话',
                navStory: '📖 末世文',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: '空间站',
                gameScoreLabel: '得分',
                gameLifeLabel: '生命',
                gameSaveLabel: '自动存档',
                gameStart: '▶ 开始',
                gameReset: '🔄 重置',
                gameHint: '⬆⬇⬅➡ 方向键操控 · 吃光点 · 躲奶娃',
                locLoading: '定位加载中...',
                aiPlaceholder: '输入任何你想说的话…',
                storyTitle: '抽象末世 · 奶龙重生复仇',
                storyGen: '⚡ 生成全新篇章',
                storyPlaceholder: '点击右侧按钮，生成无逻辑、超抽象、闭环重生末世复仇网文，剧情随机永不重复，自动本地缓存。',
                aiCredit: ' · 由青云客智能API驱动',
            },
            en: {
                navGame: '🎮 Eat Baby',
                navAI: '💬 AI Chat',
                navStory: '📖 Apocalypse',
                themeDark: '🌙',
                themeLight: '☀️',
                langZh: '中文',
                langEn: 'EN',
                logoSub: 'Space Station',
                gameScoreLabel: 'Score',
                gameLifeLabel: 'Life',
                gameSaveLabel: 'Auto Save',
                gameStart: '▶ Start',
                gameReset: '🔄 Reset',
                gameHint: '⬆⬇⬅➡ Arrow Keys · Eat Dots · Dodge',
                locLoading: 'Loading location...',
                aiPlaceholder: 'Type anything…',
                storyTitle: 'Abstract Apocalypse · Revenge Rebirth',
                storyGen: '⚡ Generate New Chapter',
                storyPlaceholder: 'Click the button to generate a chaotic, abstract, closed-loop rebirth revenge story. Random & auto-cached.',
                aiCredit: ' · Powered by Qingyunke AI',
            }
        };

        let currentLang = 'zh';
        let currentTheme = 'dark';

        // 应用语言
        function applyLang(lang) {
            currentLang = lang;
            const dict = LANG[lang];
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (dict[key] !== undefined) {
                    if (el.tagName === 'INPUT' && el.placeholder !== undefined) {
                        el.placeholder = dict[key];
                    } else {
                        el.textContent = dict[key];
                    }
                }
            });
            // 更新logo子标题特殊处理
            const logoSub = document.getElementById('logoSub');
            if (logoSub) logoSub.textContent = dict.logoSub;
            // 更新AI credit
            const credit = document.getElementById('aiCredit');
            if (credit) credit.textContent = dict.aiCredit || '';
            // 更新lang按钮状态
            document.querySelectorAll('.lang-group .ctrl-btn').forEach(btn => {
                btn.classList.toggle('active-ctrl', btn.dataset.lang === lang);
            });
            // 重新渲染聊天历史（保留内容不变）
        }

        // 应用主题
        function applyTheme(theme) {
            currentTheme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-group .ctrl-btn').forEach(btn => {
                btn.classList.toggle('active-ctrl', btn.dataset.theme === theme);
            });
        }

        // 主题切换事件
        document.querySelectorAll('.theme-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                applyTheme(btn.dataset.theme);
                showToast(btn.dataset.theme === 'dark' ? '🌙 暗色模式' : '☀️ 亮色模式');
            });
        });
        // 语言切换事件
        document.querySelectorAll('.lang-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                applyLang(btn.dataset.lang);
                showToast(btn.dataset.lang === 'zh' ? '🇨🇳 中文' : '🇬🇧 English');
            });
        });

        // ============================================================
        //  2. 全局工具：Toast / LocalDB / Location / API
        // ============================================================
        const Toast = document.getElementById('toast');
        let toastTimer = null;

        function showToast(text) {
            Toast.textContent = text;
            Toast.style.display = 'block';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { Toast.style.display = 'none'; }, 2200);
        }

        const LocalDB = {
            set(key, val) { localStorage.setItem(key, JSON.stringify(val)); },
            get(key) { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; },
            del(key) { localStorage.removeItem(key); },
            clear() { localStorage.clear(); }
        };

        // 定位
        const LocationAPI = {
            async getCity() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        document.getElementById('locationText').innerHTML = '📍 浏览器禁止定位';
                        resolve('北京');
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        try {
                            const res = await fetch(
                                `https://geoapi.qweather.com/v2/city/lookup?location=${lon},${lat}&key=HE2Z3JzH2kf4gCnXg0jY7tRz`
                            );
                            const data = await res.json();
                            if (data.code === '200' && data.location && data.location.length) {
                                const city = data.location[0].name;
                                document.getElementById('locationText').innerHTML = `📍 ${city}`;
                                LocalDB.set('userCity', city);
                                resolve(city);
                            } else {
                                resolve('北京');
                            }

        // 绘制
        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 地图
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const v = map[y][x];
                    if (v === 1) {
                        ctx.fillStyle = '#2367d8';
                        ctx.fillRect(x * SIZE, y * SIZE, SIZE - 1, SIZE - 1);
                    } else if (v === 2) {
                        ctx.fillStyle = '#ffe100';
                        ctx.beginPath();
                        ctx.arc(x * SIZE + SIZE / 2, y * SIZE + SIZE / 2, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            // 奶龙
            const inv = invincible > 0 && Math.floor(invincible / 6) % 2 === 0;
            if (!inv) {
                ctx.fillStyle = '#ffe100';
                ctx.beginPath();
                ctx.arc(nailong.x * SIZE + SIZE / 2, nailong.y * SIZE + SIZE / 2, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(nailong.x * SIZE + 26, nailong.y * SIZE + 14, 3, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // 闪烁
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(nailong.x * SIZE + SIZE / 2, nailong.y * SIZE + SIZE / 2, 16, 0, Math.PI * 2);
                ctx.fill();
            }
            // 奶娃
            babyList.forEach(baby => {
                ctx.fillStyle = baby.color;
                ctx.beginPath();
                ctx.arc(baby.x * SIZE + SIZE / 2, baby.y * SIZE + SIZE / 2, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(baby.x * SIZE + 14, baby.y * SIZE + 16, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(baby.x * SIZE + 26, baby.y * SIZE + 16, 4, 0, Math.PI * 2);
                ctx.fill();
            });
            // 游戏结束遮罩
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffe100';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('💔 GAME OVER', canvas.width / 2, canvas.height / 2);
            }
        }

        // 游戏逻辑更新 (每帧)
        function gameUpdate() {
            if (!gameRun || gameOver) return;

            // ---- 奶龙移动 ----
            let nx = nailong.x,
                ny = nailong.y;
            switch (nailong.nextDir) {
                case 'up':
                    ny--;
                    break;
                case 'down':
                    ny++;
                    break;
                case 'left':
                    nx--;
                    break;
                case 'right':
                    nx++;
                    break;
            }
            if (canMove(nx, ny)) {
                nailong.dir = nailong.nextDir;
                nailong.x = nx;
                nailong.y = ny;
            } else {
                let ox = nailong.x,
                    oy = nailong.y;
                switch (nailong.dir) {
                    case 'up':
                        oy--;
                        break;
                    case 'down':
                        oy++;
                        break;
                    case 'left':
                        ox--;
                        break;
                    case 'right':
                        ox++;
                        break;
                }
                if (canMove(ox, oy)) { nailong.x = ox;
                    nailong.y = oy; }
            }

            // ---- 吃光点 ----
            if (map[nailong.y] && map[nailong.y][nailong.x] === 2) {
                map[nailong.y][nailong.x] = 0;
                gameScore += 10;
                updateGameUI();
            }

            // ---- 奶娃移动 (随机) ----
            const dirs = ['up', 'down', 'left', 'right'];
            babyList.forEach(baby => {
                const rd = dirs[Math.floor(Math.random() * 4)];
                let bx = baby.x,
                    by = baby.y;
                switch (rd) {
                    case 'up':
                        by--;
                        break;
                    case 'down':
                        by++;
                        break;
                    case 'left':
                        bx--;
                        break;
                    case 'right':
                        bx++;
                        break;
                }
                if (canMove(bx, by)) { baby.x = bx;
                    baby.y = by; }
            });

            // ---- 碰撞检测 (带无敌帧) ----
            if (invincible > 0) {
                invincible--;
            } else {
                let hit = false;
                for (const baby of babyList) {
                    if (baby.x === nailong.x && baby.y === nailong.y) {
                        hit = true;
                        break;
                    }
                }
                if (hit) {
                    gameLife--;
                    updateGameUI();
                    if (gameLife <= 0) {
                        gameLife = 0;
                        updateGameUI();
                        gameRun = false;
                        gameOver = true;
                        showToast('💔 游戏结束！奶龙被抓住了…');
                        drawGame();
                        return;

                    // 重置奶龙位置 + 无敌帧

                }
            }

            // ---- 胜利判定: 光点吃光 ----

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (map[y][x] === 2) dotsLeft++;
                }

            if (dotsLeft === 0 && gameRun) {
                gameRun = false;
                gameOver = true;
                showToast('🎉 恭喜！所有光点吃完！奶龙胜利！');
                drawGame();
            }
        }

        // ---- 调用青云客AI (JSONP方式) ----
        function callQingyunke(msg) {
            return new Promise((resolve) => {
                const callbackName = 'qingyunke_cb_' + Date.now();
                const script = document.createElement('script');
                const url = `https://api.qingyunke.com/api.php?msg=${encodeURIComponent(msg)}&type=json&callback=${callbackName}`;
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    if (data && data.result === 0) {
                        resolve(data.content);
                    } else {
                        resolve(null);
                    }
                };
                script.src = url;
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(null);
                };
                document.body.appendChild(script);
                // 超时保护
                setTimeout(() => {
                    if (window[callbackName]) {
                        delete window[callbackName];
                        document.body.removeChild(script);
                        resolve(null);
                    }
                }, 8000);

                '以自身为祭品净化整个末世', '发现一切皆是虚拟幻境，选择醒来'
            ],
            twist: [
                '然而奶龙发现，自己才是真正的末世源头',
                '反转：所有奶娃都是奶龙分裂出的负面人格',
                '惊天内幕：世界早已毁灭，一切只是奶龙的濒死幻想',
                '奶龙觉醒记忆：它是远古神祇的最后一枚碎片',
                '终极真相：奶娃族群其实是奶龙的后代，因变异而反噬',
                '隐藏设定：每一次重生都会让世界更接近终极毁灭',
                '奶龙触碰世界边缘，发现外面还有无数个平行末世',
                '其实奶龙从未离开过祭坛，所有经历都是精神折磨'
            ],
            scene: [
                '血月当空，骸骨铺就的荒原上，奶龙独自前行。',
                '霓虹残骸中闪烁的数据流，映照着奶龙冰冷的眼神。',
                '酸雨倾盆，奶龙在废墟中挖掘出前世的记忆碎片。',
                '倒置的钟楼悬于天际，指针逆时针疯狂旋转。',
                '焦土上盛开诡异的血色花朵，每一朵都藏着诅咒。',
                '奶龙踏入镜像湖面，湖水映出无数个不同命运的自我。',
                '天空裂开巨缝，蠕动的黑暗伸出触手试探地面。',
                '废弃的机甲群中，奶龙发现了一具与己身相似的骸骨。'
            ]
        };

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generateLongStory() {
            const w = pick(wordPool.world);
            const a = pick(wordPool.ability);
            const e = pick(wordPool.enemy);
            const r = pick(wordPool.rule);
            const p = pick(wordPool.plot);
            const ed = pick(wordPool.end);
            const tw = pick(wordPool.twist);
            const sc1 = pick(wordPool.scene);
            const sc2 = pick(wordPool.scene);
            const sc3 = pick(wordPool.scene);

            // 构建超长篇章 (约1000-1500字)
            const parts = [
                `# 【${w}】· 蛋黄龙万次重生复仇录\n`,
                `## 序章 · 末世铁律\n`,
                `这片破碎的世界，遵循着残酷的铁律：${r}。\n`,
                `奶龙生于浮空蛋黄神域，族群世代制衡地底僵尸族群。而地底深处，${e}正悄然崛起。\n\n`,
                `## 前世 · 血与背叛\n`,
                `万次轮回之前，奶龙历尽宿命劫难：${p}。\n`,
                `${sc1}\n`,
                `末世酸雨腐蚀龙鳞，僵尸奶娃撕毁族群契约，啃食奶龙的情绪本源，将其封印在时间夹缝中，永世承受濒死痛感。\n\n`,
                `## 觉醒 · 禁忌之力\n`,
                `濒死刹那，奶龙触发天赋异能【${a}】，挣脱生死判定，开启闭环重生。\n`,
                `${sc2}\n`,
                `每一次重生，世界逻辑都会随机篡改：树木流淌血液、僵尸惧怕黄色光源、奶娃会复刻奶龙神态博取同情、昼夜时间无序颠倒。\n`,
                `没有绝对善恶，没有固定战力数值，所有规则随复仇进度随机崩塌重构。\n\n`,
                `## 征途 · 荒原猎杀\n`,
                `奶龙不再救赎人类，不再心软共情同族。\n`,
                `${sc3}\n`,
                `踏遍腐朽楼宇、骸骨荒原、倒置深海，猎杀所有异化奶娃，撕碎当年背叛真相。\n`,
                `在无数次生死边缘，奶龙逐渐触摸到末世最深处的秘密……\n\n`,
                `## 惊天反转 · 真相浮现\n`,
                `${tw}\n`,
                `这个发现彻底动摇了奶龙的复仇信念，也揭开了末世存在的真正意义。\n\n`,
                `## 最终抉择 · 宿命终章\n`,
                `本次轮回的最终宿命：${ed}。\n`,
                `奶龙站在时空的十字路口，凝视着无数个平行自我，做出了最终选择。\n\n`,
                `---\n`,
                `【本故事纯属抽象虚构 · 无科学逻辑 · 无世界观闭环 · 随机生成仅此一篇】\n`,
                `🐲 奶龙专属 · 末世复仇史诗 · 万次重生永不完结`
            ];

            return parts.join('\n');
        }

        function generateAndSaveStory() {
            const story = generateLongStory();
            storyBox.textContent = story;
            LocalDB.set('lastNailongStory', story);
            showToast('📜 全新超长末世篇章生成完毕！');
        }

        document.getElementById('createStory').addEventListener('click', generateAndSaveStory);

        // 加载上次小说
        const oldStory = LocalDB.get('lastNailongStory');
        if (oldStory) storyBox.textContent = oldStory;

        // ============================================================
        //  7. 初始化：定位 + 主题/语言恢复
        // ============================================================
        // 恢复主题
        const savedTheme = LocalDB.get('nailongTheme') || 'dark';
        applyTheme(savedTheme);
        // 恢复语言
        const savedLang = LocalDB.get('nailongLang') || 'zh';
        applyLang(savedLang);

        // 保存主题/语言偏好
        document.querySelectorAll('.theme-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                LocalDB.set('nailongTheme', btn.dataset.theme);
            });
        });
        document.querySelectorAll('.lang-group .ctrl-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                LocalDB.set('nailongLang', btn.dataset.lang);
            });
        });

        // 定位
        LocationAPI.getCity();

        // 额外：点击模块内的导航时，保持语言/主题不变
        console.log('🐲 奶龙AI助理空间站 已启动 ✨');
        console.log('📦 主题:', currentTheme, ' 语言:', currentLang);
        console.log('💡 游戏: requestAnimationFrame + 无敌帧 | AI: 青云客API | 小说: 超长篇章');
    </script>
</body>
</html>
